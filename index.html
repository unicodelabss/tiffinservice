<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mukesh Patel Tiffin Service</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#ff6b35;
    --primary-dark:#e85a24;
    --secondary:#ff914d;
    --bg:#fff7f2;
    --dark:#1f2937;
    --white:#ffffff;
    --shadow:0 12px 35px rgba(0,0,0,.12);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    background:var(--bg);
    color:#333;
}

/* HERO */

.hero{
    background:linear-gradient(135deg,#ff6b35,#ff914d);
    color:white;
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:clamp(2rem,5vw,4rem);
    margin-bottom:10px;
}

.hero p{
    font-size:1.1rem;
    max-width:700px;
    margin:auto;
    opacity:.95;
}

.price-badge{
    display:inline-block;
    margin-top:25px;
    background:white;
    color:var(--primary);
    padding:12px 25px;
    border-radius:50px;
    font-weight:700;
    font-size:1.2rem;
}

.hero-buttons{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    padding:14px 28px;
    border-radius:50px;
    font-weight:600;
    transition:.3s;
}

.btn-call{
    background:white;
    color:var(--primary);
}

.btn-menu{
    border:2px solid white;
    color:white;
}

.btn:hover{
    transform:translateY(-3px);
}

/* SECTION */

.section{
    max-width:1200px;
    margin:auto;
    padding:70px 20px;
}

.section-title{
    text-align:center;
    margin-bottom:40px;
}

.section-title h2{
    font-size:2.2rem;
    color:var(--dark);
}

.section-title p{
    color:#666;
    margin-top:8px;
    font-size: 1.2rem;
}

/* MENU GRID */

.menu-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.menu-card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:var(--shadow);
    transition:.3s;
}

.menu-card:hover{
    transform:translateY(-8px);
}

.day{
    background:linear-gradient(135deg,#ff6b35,#ff914d);
    color:white;
    padding:16px;
    font-size:1.2rem;
    font-weight:600;
}

.food{
    padding:20px;
    font-size:1.1rem;
    color:#555;
    font-weight: 500;
}

/* CONTACT */

.contact{
    background:#111827;
    color:white;
    text-align:center;
    padding:70px 20px;
}

.contact h2{
    margin-bottom:10px;
}

.contact-number{
    font-size:2.5rem;
    font-weight:700;
    color:#ffb27d;
    margin:20px 0;
}

.contact-buttons{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
}

.call-btn,
.whatsapp-btn{
    text-decoration:none;
    color:white;
    padding:14px 28px;
    border-radius:50px;
    font-weight:600;
}

.call-btn{
    background:var(--primary);
}

.whatsapp-btn{
    background:#25D366;
}

/* FLOAT BUTTON */

.floating-whatsapp{
    position:fixed;
    right:20px;
    bottom:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#25D366;
    color:white;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    z-index:999;
}

/* FOOTER */

footer{
    background:#0f172a;
    color:#ccc;
    text-align:center;
    padding:18px;
}

/* MOBILE */

@media(max-width:768px){

.hero{
    padding:60px 15px;
}

.hero-buttons{
    flex-direction:column;
    align-items:center;
}

.btn{
    width:100%;
    max-width:280px;
}

.contact-number{
    font-size:1.8rem;
}

.call-btn,
.whatsapp-btn{
    width:100%;
    max-width:280px;
}

}

</style>
</head>
<body>

<!-- HERO -->

<section class="hero">

    <h1>Mukesh Patel Tiffin Service</h1>

    <p style="font-size: 1.5rem; font-weight: 600;">
        अब घर वाला स्वाद मात्र ₹50 में
    </p>

    <div class="price-badge">
        ₹50 प्रति टिफिन
    </div>

    <div class="hero-buttons">

        <a href="tel:+919696460583" class="btn btn-call">
            📞 Call Now
        </a>

        <a href="#menu" class="btn btn-menu">
            🍽️ View Menu
        </a>

    </div>

</section>

<!-- MENU -->

<section class="section" id="menu">

    <div class="section-title">
        <h2>साप्ताहिक मेन्यू</h2>
        <p>सस्ता भी और अच्छा भी</p>
    </div>

    <div class="menu-grid" id="menuGrid"></div>

</section>

<!-- CONTACT -->

<section class="contact">

    <h2>ऑर्डर करने के लिए संपर्क करें</h2>

    <div class="contact-number">
        📱 9696460583
    </div>

    <div class="contact-buttons">

        <a href="tel:+919696460583" class="call-btn">
            📞 Call Now
        </a>

        <a
        href="https://wa.me/919696460583?text=नमस्ते मुकेश पटेल टिफिन सर्विस, मुझे टिफिन ऑर्डर करना है।"
        target="_blank"
        class="whatsapp-btn">

            💬 WhatsApp

        </a>

    </div>

</section>

<footer>
    © 2024 Mukesh Patel Tiffin Service | All Rights Reserved
</footer>

<!-- FLOATING WHATSAPP -->

<a
href="https://wa.me/919696460583?text=नमस्ते मुकेश पटेल टिफिन सर्विस"
target="_blank"
class="floating-whatsapp">
💬
</a>

<script>

const menuData = [

{
day:"सोमवार",
food:"दाल, चावल, सब्जी, 4 रोटी"
},

{
day:"मंगलवार",
food:"कडी, चावल, 4 रोटी"
},

{
day:"बुधवार",
food:"5 आलु पराठा, चटनी"
},

{
day:"गुरुवार",
food:"दाल, चावल, सब्जी, 4 रोटी"
},

{
day:"शुक्रवार",
food:"छोला, चावल, पूरी"
},

{
day:"शनिवार",
food:"सब्जी, 5 सादा पराठा"
},

{
day:"रविवार",
food:"पनीर, पूरी, चावल"
}

];

const menuGrid = document.getElementById("menuGrid");

menuData.forEach(item=>{

menuGrid.innerHTML += `
<div class="menu-card">
    <div class="day">${item.day}</div>
    <div class="food">${item.food}</div>
</div>
`;

});

</script>

</body>
</html>
